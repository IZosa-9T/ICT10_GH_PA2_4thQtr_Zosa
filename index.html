<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Style link. -->
    <link rel="stylesheet" type="text/css" href="style.css">

    <!-- Bootstrap link. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Fonts link. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Short+Stack&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Buda:wght@300&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet">

    <!-- Pyscript. -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <title>Object Oriented Programming</title>

</head>
<body>
    
    <br><br><br>

    <div class="narrow">

        <div class="center shortstackfont">
            <h3><b>Object Oriented Programming</b></h3>
        </div>

        <br>

        <div class="justify">
            <p class="shortstackfont"><b>10 Topaz</b></p>
            <p id="output1" class="montserratfont"></p>

            <br>

            <p class="shortstackfont"><b>10 Sapphire</b></p>
            <p id="output2" class="montserratfont"></p>
        </div>

        <br>

        <div class="justify">
            <p class="shortstackfont"><b>Dogs</b></p>
            <p id="output3" class="montserratfont"></p>
            
            <form class="montserratfont">
                <div class="row">
                    <div class="col-sm-6">
                        <input type="text" id="input1" placeholder="Enter your name"><br>
                        <input type="text" id="input2" placeholder="Enter your dog's name"><br>
                    </div>
                    <div class="col-sm-6">
                        <input type="number" id="input3" placeholder="Enter your dog's age"><br>
                        <input type="text" id="input4" placeholder="Enter your dog's breed"><br><br>
                    </div>
                </div>
                
                <div class="center">
                    <input type="button" py-click="userdoginfo" class="btn" value="Submit">
                </div>
            </form>

            <p id="output4" class="montserratfont"></p>
        </div>

        <br><br>

    </div>
    
    <py-script src="main.py"></py-script>

</body>
</html>
